name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Matrix dimensions covered for Codecov to reflect the full SIMD tier
# cascade:
#
# - aarch64 NEON (macOS): covers src/skip/neon.rs plus the
#   `neon_available()` branch of the dispatcher.
# - aarch64 scalar-forced: covers the scalar fallback branch of the
#   dispatcher on aarch64 (reached only when `memspan_force_scalar` is
#   set, since NEON is mandatory on Apple Silicon otherwise).
# - x86_64 default (Linux): covers whichever top tier the runner CPU
#   supports (typically AVX2 on AMD Milan ubuntu-latest runners).
# - x86_64 AVX2-max: `--cfg memspan_disable_avx512` forces the AVX2
#   dispatcher branch regardless of runner CPU.
# - x86_64 SSE4.2-max: `--cfg memspan_disable_avx512 --cfg
#   memspan_disable_avx2` forces the SSE4.2 dispatcher branch.
# - x86_64 scalar-forced: `--cfg memspan_force_scalar` forces the scalar
#   dispatcher branch on x86_64.
# - x86_64 Windows: validates the MSVC toolchain compiles the
#   intrinsic-heavy modules and reports coverage of their default runtime
#   path.
#
# Each platform excludes SIMD files it cannot compile (gated behind
# `#[cfg(target_arch)]`). Without exclusion, tarpaulin would count them
# as 0/N uncovered lines, dragging down the per-platform number. After
# Codecov merges, every arch file is covered by its native host.
#
# wasm32 simd128 (`src/skip/simd128.rs`, `src/needles/arch/wasm32.rs`)
# is intentionally excluded from every entry: rustc cannot emit LLVM
# coverage data for any wasm target on stable (rust-lang/rust#81684 —
# `profiler_builtins` is not shipped for wasm), and `cargo-llvm-cov`
# rejects `--target wasm32-*` for the same reason
# (taiki-e/cargo-llvm-cov#221). The simd128 backend's correctness is
# instead verified end-to-end by the `test-wasm-simd128` job in
# `ci.yml`, which runs the test suite under wasmtime with
# `+simd128`. Revisit when rust-lang/rust#81684 is resolved.

jobs:
  coverage:
    name: coverage (${{ matrix.label }})
    strategy:
      matrix:
        include:
          # ---- aarch64 (macOS) ----
          # `ignore_regex` excludes SIMD files this platform cannot run
          # (would otherwise count as 0/N uncovered, dragging the
          # per-platform number down). After Codecov merges, every arch
          # file is covered by its native host.
          - os: macos-latest
            label: macos-aarch64
            rustflags: ''
            ignore_regex: '(benches/|src/skip/sse42\.rs|src/skip/avx2\.rs|src/skip/avx512\.rs|src/skip/simd128\.rs|src/needles/arch/x86\.rs|src/needles/arch/wasm32\.rs)'
          - os: macos-latest
            label: macos-aarch64-scalar
            rustflags: '--cfg memspan_force_scalar'
            ignore_regex: '(benches/|src/skip/sse42\.rs|src/skip/avx2\.rs|src/skip/avx512\.rs|src/skip/simd128\.rs|src/needles/arch/x86\.rs|src/needles/arch/wasm32\.rs)'

          # ---- x86_64 (Linux) ----
          # Standard ubuntu-latest is AMD EPYC (no AVX-512), so the
          # default tier exercises AVX2 at runtime. AVX-512 coverage on
          # this runner is generated by the separate `coverage-sde` job
          # below, which executes the test binaries under Intel SDE
          # `-icx` so `is_x86_feature_detected!("avx512bw")` returns true.
          - os: ubuntu-latest
            label: linux-x86_64
            rustflags: ''
            ignore_regex: '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)'
          - os: ubuntu-latest
            label: linux-x86_64-avx2-max
            rustflags: '--cfg memspan_disable_avx512'
            ignore_regex: '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)'
          - os: ubuntu-latest
            label: linux-x86_64-sse42-max
            rustflags: '--cfg memspan_disable_avx512 --cfg memspan_disable_avx2'
            ignore_regex: '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)'
          - os: ubuntu-latest
            label: linux-x86_64-scalar
            rustflags: '--cfg memspan_force_scalar'
            ignore_regex: '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)'

          # ---- x86_64 (Windows) ----
          - os: windows-latest
            label: windows-x86_64
            rustflags: ''
            ignore_regex: '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)'
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust + llvm-tools-preview
        # `cargo-llvm-cov` requires the `llvm-tools-preview` rustup
        # component for `llvm-profdata` / `llvm-cov`. `--no-self-update`
        # is necessary because the windows environment cannot
        # self-update rustup.exe.
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ matrix.label }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-${{ matrix.label }}-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        # `cargo-llvm-cov` is preferred over `cargo-tarpaulin` because
        # llvm's source-based instrumentation reports coverage at the
        # subexpression level (chained iterator calls, closing braces of
        # match arms, etc.), whereas tarpaulin's line table omits many
        # of those; a tarpaulin scalar function shows L230 covered but
        # leaves L232/L234 (its `.iter()` / `.count()` continuations)
        # unmentioned, which the merged Codecov report then attributes
        # as misses against the AVX-512-SDE entry's more granular line
        # table. Using llvm-cov uniformly across the matrix gives every
        # entry the same line table, so any-hit merging works as
        # intended.
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov \
            --all-features \
            --tests \
            --ignore-filename-regex '${{ matrix.ignore_regex }}' \
            --cobertura \
            --output-path coverage/cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.label }}
          path: coverage/cobertura.xml

  # AVX-512 coverage on x86_64 Linux. The standard ubuntu-latest runner
  # is AMD EPYC (no AVX-512), so without an emulator the AVX-512 kernel's
  # `is_x86_feature_detected!("avx512bw")` runtime gate returns false and
  # `src/skip/avx512.rs` is reported as 0% covered.
  #
  # We use `cargo-llvm-cov` here instead of `cargo-tarpaulin` because
  # tarpaulin invokes test binaries directly via `std::process::Command`
  # and ignores `CARGO_TARGET_<TRIPLE>_RUNNER` (xd009642/tarpaulin#1690,
  # closed without implementation). `cargo-llvm-cov` shells out through
  # `cargo test`, which honors the runner, so SDE intercepts CPUID and
  # the AVX-512 dispatch branch executes.
  #
  # Output is cobertura XML so the existing `upload-codecov` job can
  # ingest it the same way as the tarpaulin matrix entries.
  coverage-sde:
    name: coverage (linux-x86_64-avx512-sde)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust + llvm-tools-preview
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-sde-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-sde-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install Intel SDE
        uses: petarpetrovt/setup-sde@v2.4
        with:
          sdeVersion: 9.33.0
          environmentVariableName: SDE_PATH

      - name: Generate coverage under SDE (-icx, Ice Lake AVX-512)
        # `cargo-llvm-cov` invokes the test binaries via `cargo test`,
        # which honors `CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER`.
        # `--target x86_64-unknown-linux-gnu` is required to make cargo
        # apply the runner config (it only kicks in when an explicit
        # target triple is set).
        shell: bash
        run: |
          mkdir -p coverage
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -icx --"
          cargo llvm-cov \
            --all-features \
            --target x86_64-unknown-linux-gnu \
            --ignore-filename-regex '(benches/|src/skip/neon\.rs|src/skip/simd128\.rs|src/needles/arch/wasm32\.rs)' \
            --cobertura \
            --output-path coverage/cobertura.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-linux-x86_64-avx512-sde
          path: coverage/cobertura.xml

  upload-codecov:
    name: Upload merged coverage to Codecov
    needs: [coverage, coverage-sde]
    runs-on: ubuntu-latest
    if: always()
    strategy:
      fail-fast: false
      matrix:
        label:
          - macos-aarch64
          - macos-aarch64-scalar
          - linux-x86_64
          - linux-x86_64-avx2-max
          - linux-x86_64-sse42-max
          - linux-x86_64-scalar
          - linux-x86_64-avx512-sde
          - windows-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Download ${{ matrix.label }} report
        uses: actions/download-artifact@v8
        with:
          name: coverage-${{ matrix.label }}
          path: coverage/

      - name: Upload ${{ matrix.label }} to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          flags: ${{ matrix.label }}
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
